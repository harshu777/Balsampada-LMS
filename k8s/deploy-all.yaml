# Complete Kubernetes deployment for Tuition LMS
# Based on the actual project structure and requirements
# Author: Harshal Baviskar
# Project: Tuition LMS with Student, Teacher, and Admin roles
---
# Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: tuition-lms
---
# ConfigMap for non-sensitive configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: tuition-lms-config
  namespace: tuition-lms
data:
  NODE_ENV: "production"
  PORT: "3001"
  FRONTEND_PORT: "3000"
  DATABASE_HOST: "postgres-service"
  DATABASE_PORT: "5432"
  DATABASE_NAME: "tuition_lms"  # Updated to match actual DB name
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  MAIL_HOST: "smtp.gmail.com"
  MAIL_PORT: "587"
  MAIL_FROM: "noreply@balsampada.com"  # Using your domain
  APP_URL: "https://balsampada.com"
  BACKEND_URL: "https://api.balsampada.com"
---
# Secret for sensitive data (you'll need to update these values)
apiVersion: v1
kind: Secret
metadata:
  name: tuition-lms-secrets
  namespace: tuition-lms
type: Opaque
stringData:
  JWT_SECRET: "change-this-to-your-jwt-secret"
  JWT_REFRESH_SECRET: "change-this-to-your-refresh-secret"
  DB_PASSWORD: "change-this-to-secure-password"
  MAIL_USER: "your-email@gmail.com"
  MAIL_PASS: "your-app-specific-password"
---
# PostgreSQL StatefulSet with Persistent Storage
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: tuition-lms
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: tuition-lms
spec:
  serviceName: postgres-service
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        securityContext:
          readOnlyRootFilesystem: true
        env:
        - name: POSTGRES_DB
          value: tuitionlms
        - name: POSTGRES_USER
          value: postgres
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: tuition-lms-secrets
              key: DB_PASSWORD
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        ports:
        - containerPort: 5432
          name: postgres
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
      volumes:
      - name: postgres-storage
        persistentVolumeClaim:
          claimName: postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: tuition-lms
spec:
  type: ClusterIP
  selector:
    app: postgres
  ports:
  - port: 5432
    targetPort: 5432
---
# Redis Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: tuition-lms
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:alpine
        securityContext:
          readOnlyRootFilesystem: true
        ports:
        - containerPort: 6379
          name: redis
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"