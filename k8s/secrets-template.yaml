# Kubernetes Secrets Template for Tuition LMS
# IMPORTANT: Do not commit this file with actual values to Git!
# Copy this to secrets.yaml and update with your actual values

apiVersion: v1
kind: Secret
metadata:
  name: tuition-lms-secrets
  namespace: tuition-lms
type: Opaque
stringData:
  # Database Password (generate a strong password)
  DB_PASSWORD: "change-this-to-secure-password"
  
  # JWT Secrets (generate using: openssl rand -base64 32)
  JWT_SECRET: "change-this-to-your-jwt-secret-min-32-chars"
  JWT_REFRESH_SECRET: "change-this-to-your-refresh-secret-min-32-chars"
  
  # Session Secret
  SESSION_SECRET: "change-this-to-your-session-secret"
  
  # Email Configuration (Gmail)
  MAIL_USER: "sonalsonone13125@gmail.com"  # Your Gmail address
  MAIL_PASS: "your-app-specific-password"   # Generate from Google Account > Security > 2-Step Verification > App passwords
  
  # Complete Database URL
  DATABASE_URL: "postgresql://postgres:change-this-password@postgres-service:5432/tuition_lms?schema=public"
  
  # Admin Default Password (change after first login)
  ADMIN_PASSWORD: "Admin@123456"
  
  # Optional: Payment Gateway Secrets
  # STRIPE_SECRET_KEY: "sk_live_..."
  # RAZORPAY_KEY_SECRET: "..."
  
  # Optional: AWS Credentials
  # AWS_ACCESS_KEY_ID: "..."
  # AWS_SECRET_ACCESS_KEY: "..."
  
  # Optional: OAuth Secrets
  # GOOGLE_CLIENT_SECRET: "..."
  
---
# How to generate secure secrets:
# 
# 1. Generate JWT Secret:
#    openssl rand -base64 32
#
# 2. Generate Database Password:
#    openssl rand -base64 24
#
# 3. Create Gmail App Password:
#    a. Go to https://myaccount.google.com/security
#    b. Enable 2-Step Verification
#    c. Go to App passwords
#    d. Generate a password for "Mail"
#
# 4. Apply secrets to Kubernetes:
#    kubectl apply -f secrets.yaml
#
# 5. Verify secrets are created:
#    kubectl get secrets -n tuition-lms
#
# 6. To update a secret:
#    kubectl delete secret tuition-lms-secrets -n tuition-lms
#    kubectl apply -f secrets.yaml