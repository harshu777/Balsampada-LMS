version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: tution-lms-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-tution_lms}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - tution-lms-network

  backend:
    image: harsh1106/tution-lms-backend:latest
    container_name: tution-lms-backend
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-tution_lms}?schema=public
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      EMAIL_HOST: ${EMAIL_HOST}
      EMAIL_PORT: ${EMAIL_PORT}
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD}
      EMAIL_FROM: ${EMAIL_FROM}
      FRONTEND_URL: ${FRONTEND_URL:-https://balsampada.com}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://balsampada.com}
      PORT: 3001
    depends_on:
      - postgres
    ports:
      - "3001:3001"
    restart: unless-stopped
    networks:
      - tution-lms-network
    command: >
      sh -c "
        npx prisma migrate deploy &&
        npm run start:prod
      "

  frontend:
    image: harsh1106/tution-lms-frontend:latest
    container_name: tution-lms-frontend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.balsampada.com/api}
      NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-https://api.balsampada.com}
    ports:
      - "3000:3000"
    restart: unless-stopped
    networks:
      - tution-lms-network

  nginx:
    image: nginx:alpine
    container_name: tution-lms-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - tution-lms-network

networks:
  tution-lms-network:
    driver: bridge

volumes:
  postgres_data: