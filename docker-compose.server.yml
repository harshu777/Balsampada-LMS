version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: balsampada-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: balsampada_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - balsampada-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: harsh1106/balsampada-backend:latest
    container_name: balsampada-backend
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres123@postgres:5432/balsampada_db?schema=public
      JWT_SECRET: your-super-secret-jwt-key-change-this-in-production-min-32-chars
      JWT_REFRESH_SECRET: your-super-secret-refresh-key-change-this-in-production
      EMAIL_HOST: smtp.gmail.com
      EMAIL_PORT: 587
      EMAIL_USER: your-email@gmail.com
      EMAIL_PASSWORD: your-app-password
      EMAIL_FROM: noreply@balsampada.com
      FRONTEND_URL: http://YOUR_SERVER_IP:3000
      CORS_ORIGINS: http://YOUR_SERVER_IP:3000
      PORT: 3001
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3001:3001"
    networks:
      - balsampada-network
    restart: unless-stopped
    command: >
      sh -c "
        echo 'Waiting for database...' &&
        sleep 10 &&
        npx prisma migrate deploy &&
        npm run start:prod
      "

  frontend:
    image: harsh1106/balsampada-frontend:latest
    container_name: balsampada-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://YOUR_SERVER_IP:3001/api
      NEXT_PUBLIC_BACKEND_URL: http://YOUR_SERVER_IP:3001
    ports:
      - "3000:3000"
    networks:
      - balsampada-network
    restart: unless-stopped
    depends_on:
      - backend

networks:
  balsampada-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local